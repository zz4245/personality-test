let currentQ = 0;
let scores = { A: 0, B: 0, C: 0, D: 0 };
let selectedOption = null;

function renderQuestion() {
  if (currentQ >= questions.length) return showResult();
  const q = questions[currentQ];
  selectedOption = null;
  document.getElementById('qNumber').textContent = `QUESTION ${currentQ + 1} / ${questions.length}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressFill').style.width = ((currentQ / questions.length) * 100) + '%';

  const container = document.getElementById('optionsContainer');
  container.innerHTML = q.options.map((opt, i) =>
    `<button class="option" data-index="${i}" onclick="selectOption(${i}, this)">${opt.text}</button>`
  ).join('');
}

function selectOption(index, el) {
  if (selectedOption !== null) return;
  selectedOption = index;
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');

  const q = questions[currentQ];
  const chosen = q.options[index];
  for (const [k, v] of Object.entries(chosen.score)) {
    scores[k] += v;
  }

  setTimeout(() => {
    currentQ++;
    if (currentQ < questions.length) {
      document.getElementById('progressFill').style.width = ((currentQ / questions.length) * 100) + '%';
      renderQuestion();
    } else {
      document.getElementById('progressFill').style.width = '100%';
      showResult();
    }
  }, 350);
}

function showResult() {
  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('resultPage').classList.add('active');

  let maxType = 'A';
  let maxScore = 0;
  for (const [k, v] of Object.entries(scores)) {
    if (v > maxScore) { maxScore = v; maxType = k; }
  }
  const r = results[maxType];
  document.getElementById('resultIcon').textContent = r.icon;
  document.getElementById('resultTitle').textContent = r.title;
  document.getElementById('resultSubtitle').textContent = r.subtitle;
  document.getElementById('resultDesc').textContent = r.desc;
  document.getElementById('resultTraits').innerHTML = r.traits.map(t => `<span class="trait">${t}</span>`).join('');
}

function restart() {
  currentQ = 0;
  scores = { A: 0, B: 0, C: 0, D: 0 };
  selectedOption = null;
  document.getElementById('questionCard').style.display = '';
  document.getElementById('resultPage').classList.remove('active');
  document.getElementById('progressFill').style.width = '0%';
  renderQuestion();
}

renderQuestion();
</script>
